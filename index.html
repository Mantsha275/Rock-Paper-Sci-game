<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Lets's Play Game</h1>
    <h2>Rock Paper Scissors</h2>
    <h3>
        Go Ahead!!
        Choose your move -</h3>
    <div class="choices">
        <button id="rock">
            <img src="./images/rock.jpg" alt="Rock">
        </button>
        <button id="paper">
            <img src="./images/paper.jpg" alt="Paper">
        </button>
        <button id="scissors">
            <img src="./images/sci.jpg" alt="Scissors">
        </button>
    </div>
    <div class="score-board">
        <div class = "score">
            <p>0</p>
            <p>You</p>
        </div>
        <div class = "score">
            <p>0</p>
            <p>Bot</p>
        </div>
    </div>
    <div class="curr-result">
    </div>
    <script src="script.js"></script>
</body>
</html>ls
